<!-- ============================================================
     login.html — SmartGovWeb Login / Sign-Up Page
     ============================================================
     Authentication gateway for the SmartGovWeb portal.
     Supports toggling between Login and Sign-Up modes.
     On successful auth, redirects to the main portal (index.html).
     Dependencies: login.css, login.js (Firebase v10 modular)
     ============================================================ -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <!-- Login page-specific stylesheet -->
    <link rel="stylesheet" href="../CSS_FILES/login.css" />
  </head>
  <body>
    <!-- ==========================================================
         AUTHENTICATION CONTAINER
         Card-style form that switches between Login and Sign-Up.
         ========================================================== -->
    <div id="auth-container" class="container">
      <h2 id="form-title">Login</h2>

      <!-- Email input field -->
      <input type="email" id="email" placeholder="Email Address" />

      <!-- Password input with visibility toggle icon -->
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Password" />
        <svg class="toggle-password" id="toggle-icon" viewBox="0 0 24 24">
          <path
            d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"
          />
        </svg>
      </div>

      <!-- Feedback messages (hidden by default) -->
      <div id="error-msg"></div>
      <div id="success-msg"></div>

      <!-- Primary action button (Login / Sign Up) -->
      <button id="action-btn" class="btn-login">Login</button>

      <!-- Toggle link between Login and Sign-Up modes -->
      <p class="toggle-text">
        <span id="toggle-mode">Don't have an account? Sign Up</span>
      </p>
    </div>

    <!-- Authentication logic: Firebase Auth, form validation, mode toggle -->
    <script type="module" src="../JAVASCRIPT.FILE/login.js"></script>
  </body>
</html>
