<!-- ============================================================
     profile.html — SmartGovWeb User Profile Editor
     ============================================================
     Standalone profile page designed to be shown inside an iframe
     modal (from index.html). Allows users to:
       • Upload/change profile photo
       • Edit official name, age, gender, contact number
       • Save changes to Firebase Realtime Database
     Uses Firebase v9 compat SDKs for simpler iframe integration.
     Dependencies: profile.css, profile.js
     ============================================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - SmartGovWeb</title>
    <!-- Google Fonts: Inter for modern, clean UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 for vector icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Profile-specific stylesheet -->
    <link rel="stylesheet" href="profile.css">
    <!-- Firebase v9 compat SDKs (loaded via script tags for iframe simplicity) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <!-- ==========================================================
         PROFILE CONTAINER
         Full-height card with header, avatar, form, and actions.
         ========================================================== -->
    <div class="profile-container">
        <!-- =======================================================
             HEADER
             Back button sends postMessage to parent to close iframe.
             ======================================================= -->
        <div class="profile-header">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>Edit Profile</h1>
        </div>

        <!-- =======================================================
             AVATAR SECTION
             Circular photo with camera overlay for upload.
             ======================================================= -->
        <div class="avatar-section">
            <div class="avatar-wrapper">
                <div id="avatarImg" class="avatar-placeholder">
                    <i class="fas fa-user"></i>
                </div>
                <!-- Camera icon triggers hidden file input -->
                <label for="photoInput" class="camera-overlay">
                    <i class="fas fa-camera"></i>
                </label>
                <input type="file" id="photoInput" accept="image/*" class="photo-input">
            </div>
            <p class="avatar-hint">Click camera to change photo</p>
        </div>

        <!-- =======================================================
             PROFILE FORM
             Fields: official name, age, gender, contact.
             ======================================================= -->
        <form id="profileForm" class="profile-form">
            <div class="form-group">
                <label>Official Name</label>
                <input type="text" id="officialName" placeholder="Enter official name" maxlength="50">
            </div>

            <!-- Age and Gender side by side -->
            <div class="form-row">
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="age" min="18" max="100" placeholder="Age">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select id="gender">
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Contact Number</label>
                <input type="tel" id="contact" placeholder="Phone number" maxlength="15">
            </div>

            <!-- ===================================================
                 ACTION BUTTONS
                 Reset reverts to last saved data.
                 Save validates and writes to Firebase.
                 =================================================== -->
            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="handleReset()">
                    <i class="fas fa-times"></i> Reset
                </button>
                <button type="button" id="saveBtn" class="btn-save" onclick="handleSave(event)">
                    <i class="fas fa-save"></i> Save Changes
                </button>
            </div>
        </form>

        <!-- Success toast message (shown after save) -->
        <div id="successMsg" class="success-message hidden">
            <i class="fas fa-check-circle"></i>
            Profile updated successfully!
        </div>
    </div>

    <!-- Profile logic: Firebase auth, data load/save, photo handling -->
    <script src="profile.js"></script>
</body>
</html>
